name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node >= 23.6 runs the TypeScript test sources directly via native
          # type stripping; no build or dependency install is required.
          node-version: '24'
      - name: Run integration tests
        run: node --test test/*.test.ts
