name = "promptscope"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Static assets bound to ASSETS — Worker handles routing,
# falls through to assets for non-API paths.
[assets]
directory = "public"
binding = "ASSETS"

[ai]
binding = "AI"

[vars]
PAYRAIL_URL = "https://payrail.ivixivi.workers.dev"

# Shared fleet money rail — internal worker→worker service binding (preferred over
# the public PAYRAIL_URL fallback; skips the edge so it dodges the *.workers.dev
# same-zone restriction and bot-management).
[[services]]
binding = "PAYRAIL"
service = "payrail"

[[kv_namespaces]]
binding = "RATE_KV"
id = "feb4c5c28d854ba4b03ab920c4876851"

[[kv_namespaces]]
binding = "SHARE_KV"
id = "d643d2cc2004423799ee01fd91e64913"

[[kv_namespaces]]
binding = "PROMPTSCOPE_PRO_TOKENS"
id = "b4dd43ba4b114d9e9cc9f2b004d8f838"

[observability]
enabled = true
