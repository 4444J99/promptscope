name = "promptscope"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Static assets bound to ASSETS — Worker handles routing,
# falls through to assets for non-API paths.
[assets]
directory = "public"
binding = "ASSETS"

[ai]
binding = "AI"

# Lemon Squeezy setup:
# - Set LEMONSQUEEZY_CHECKOUT_URL to the hosted checkout/buy URL for PromptScope Pro.
# - Optionally set product/variant IDs to reject valid Lemon licenses from other products.
# [vars]
# LEMONSQUEEZY_CHECKOUT_URL = "https://your-store.lemonsqueezy.com/buy/..."
# LEMONSQUEEZY_PRODUCT_ID = "123456"
# LEMONSQUEEZY_VARIANT_ID = "123456"

# First-party API keys (/api/keys):
# ADMIN_TOKEN authorizes issuing / listing / revoking API keys. It is a SECRET,
# never a plaintext [vars] entry — set it out of band:
#   Production:  wrangler secret put ADMIN_TOKEN
#   Local dev:   add ADMIN_TOKEN to .dev.vars (see .dev.vars.example)
# Issued keys (psk_...) are stored only as SHA-256 hashes in PROMPTSCOPE_PRO_TOKENS.

[[kv_namespaces]]
binding = "RATE_KV"
id = "feb4c5c28d854ba4b03ab920c4876851"

[[kv_namespaces]]
binding = "SHARE_KV"
id = "d643d2cc2004423799ee01fd91e64913"

[[kv_namespaces]]
binding = "PROMPTSCOPE_PRO_TOKENS"
id = "b4dd43ba4b114d9e9cc9f2b004d8f838"

[observability]
enabled = true
